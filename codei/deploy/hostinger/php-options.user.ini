; Hostinger shared hosting PHP options (example)
; Place in the active web root only if needed.

display_errors = Off
log_errors = On
memory_limit = 256M
max_execution_time = 120
upload_max_filesize = 32M
post_max_size = 32M
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
