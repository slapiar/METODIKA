# Apache VirtualHost for production/staging
# Project: METODIKA (CodeIgniter 4)
# Expected OS: Ubuntu/Debian with Apache 2.4 + PHP-FPM

# Redirect HTTP to HTTPS
<VirtualHost *:80>
    ServerName metodika.example.com
    ServerAlias www.metodika.example.com

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName metodika.example.com
    ServerAlias www.metodika.example.com

    DocumentRoot /var/www/metodika/codei/public
    DirectoryIndex index.php

    ErrorLog ${APACHE_LOG_DIR}/metodika-prod-error.log
    CustomLog ${APACHE_LOG_DIR}/metodika-prod-access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/metodika.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/metodika.example.com/privkey.pem

    <Directory /var/www/metodika/codei/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # PHP-FPM socket from dedicated pool template
    # (fallback option: /run/php/php8.4-fpm.sock)
    <FilesMatch "\\.php$">
        SetHandler "proxy:unix:/run/php/php8.4-fpm-metodika.sock|fcgi://localhost"
    </FilesMatch>

    # Block sensitive files if copied accidentally
    <FilesMatch "^(env|\\.env|composer\\.(json|lock)|phpunit\\.dist\\.xml)$">
        Require all denied
    </FilesMatch>

    # Tighten setup endpoint: deny by default in production
    <Location "/setup.php">
        Require all denied
    </Location>

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
</VirtualHost>
