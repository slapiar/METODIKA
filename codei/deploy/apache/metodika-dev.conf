# Apache VirtualHost for local development
# Project: METODIKA (CodeIgniter 4)
# Expected OS: Ubuntu/Debian with Apache 2.4 + PHP-FPM

<VirtualHost *:80>
    ServerName metodika.local
    ServerAlias www.metodika.local

    DocumentRoot /workspaces/METODIKA/codei/public
    DirectoryIndex index.php

    ErrorLog ${APACHE_LOG_DIR}/metodika-dev-error.log
    CustomLog ${APACHE_LOG_DIR}/metodika-dev-access.log combined

    <Directory /workspaces/METODIKA/codei/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Send PHP files to PHP-FPM.
    # If your socket differs, adjust this path.
    <FilesMatch "\\.php$">
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Keep setup endpoint available only when explicitly needed.
    # For normal operation you can remove this block.
    <Location "/setup.php">
        Require local
    </Location>

    # Conservative baseline security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>
