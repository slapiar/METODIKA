; PHP-FPM pool template for METODIKA
; File location example: /etc/php/8.4/fpm/pool.d/metodika.conf

[metodika]
user = www-data
group = www-data

listen = /run/php/php8.4-fpm-metodika.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Timeouts for typical web workloads
request_terminate_timeout = 120s

; Per-project php.ini overrides
php_admin_value[error_log] = /var/log/php8.4-fpm/metodika-error.log
php_admin_flag[log_errors] = on
php_admin_flag[display_errors] = off
php_admin_value[memory_limit] = 256M
php_admin_value[upload_max_filesize] = 32M
php_admin_value[post_max_size] = 32M

; Recommended for CodeIgniter production bootstrap
env[CI_ENVIRONMENT] = production
